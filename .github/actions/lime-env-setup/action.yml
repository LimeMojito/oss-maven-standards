name: "Lime Environment Setup"
description: "Configures the build environment to work with Lime resources ( Java, AWS, Docker[ARM] )."
inputs:
  aws-region:
    description: 'AWS Region name'
    required: true
  role-to-assume:
    description: 'AWS Role ARN to run with'
    required: true
  code-signing-key:
    description: 'Code signing GPG key data'
    required: true
  code-signing-passphrase:
    description: 'Code signing GPG passphrase'
    required: true
  git-access-key:
    description: 'Git access key'
    required: true
  git-signing-key:
    description: 'Git commit signing key'
    required: true

runs:
  using: composite
  steps:
    - name: Lime Setup Git
      uses: LimeMojito/oss-maven-standards/.github/actions/lime-env-setup-git@master
      with:
        git-access-key: ${{ inputs.git-access-key }}
        git-signing-key: ${{ inputs.git-signing-key }}

    - name: Lime Setup Java
      uses: LimeMojito/oss-maven-standards/.github/actions/lime-env-setup-java@master
      with:
        code-signing-key: ${{ inputs.code-signing-key }}
        code-signing-passphrase: ${{ inputs.code-signing-passphrase }}

    - name: Lime Setup AWS
      uses: LimeMojito/oss-maven-standards/.github/actions/lime-env-setup-aws@master
      with:
        aws-region: ${{ inputs.aws-region }}
        role-to-assume: ${{ inputs.role-to-assume }}

    - name: Lime Setup Docker
      uses: LimeMojito/oss-maven-standards/.github/actions/lime-env-setup-docker@master
