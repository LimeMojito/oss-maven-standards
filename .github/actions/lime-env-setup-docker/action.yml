name: "Lime Environment Setup Docker"
description: |
  Configures the build environment to work with Docker[ARM] and expects to be running on an ARM runner.
  Does not support Windows runners and skips installation.

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v4
      if: runner.os != 'Windows'

    - name: Cache Docker images.
      if: runner.os != 'Windows'
      uses: AndreKurait/docker-cache@0.6.0
      with:
        key: docker-LimeMojito-OSS
