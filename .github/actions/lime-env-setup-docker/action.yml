name: "Lime Environment Setup Docker"
description: |
  Configures the build environment to work with Docker[ARM] on x86.

runs:
  using: composite
  steps:
    - uses: docker/setup-qemu-action@v4
      with:
        platforms: 'arm64'

    - uses: docker/setup-buildx-action@v4

    - name: Cache Docker images.
      uses: AndreKurait/docker-cache@0.6.0
      with:
        key: docker-LimeMojito-OSS
