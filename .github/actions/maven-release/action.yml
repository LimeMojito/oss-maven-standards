description: "Performs a build and maven deployment similar to a maven release with commits pushed at the end."
inputs:
  code-signing-key-name:
    description: 'Code signing GPG key name'
    required: true
  code-signing-passphrase:
    description: 'Code signing GPG passphrase'
    required: true
  extra-mvn-options:
    description: 'Extra maven command line options'
    required: false
outputs:
  release-version:
    description: 'The release version'
    value: ${{ steps.git_release_version.outputs.lime-release-version }}

runs:
  using: composite
  steps:
    - id: git_release_version
      name: Increment Release Version
      shell: bash
      run: |
        echo -e "Incrementing release version\n\n"
        mvn --no-transfer-progress \
          build-helper:parse-version \
          versions:set \
            -DprocessAllModules=true \
            -DnewVersion=\${parsedVersion.majorVersion}.\${parsedVersion.minorVersion}.\${parsedVersion.incrementalVersion} \
          versions:commit
        projectVersion=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout )
        git add .
        git commit -S -m "[Release] updated version in pom.xml"
        tagName="$projectVersion"
        echo "Tagging repository with [$tagName]"
        git tag -a $tagName -m "[Release] Release Tag"        
        echo "lime-release-version=$tagName" >> "$GITHUB_OUTPUT"

    - name: Increment development version
      shell: bash
      run: |
        echo -e "\n\nIncrementing developer version"
        mvn --no-transfer-progress   \
          build-helper:parse-version \
          versions:set \
            -DprocessAllModules=true \
            -DnewVersion=\${parsedVersion.majorVersion}.\${parsedVersion.minorVersion}.\${parsedVersion.nextIncrementalVersion}-SNAPSHOT \
          versions:commit
        developmentVersion=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout )
        echo "Adding version change to ${developmentVersion} to git"
        git add .
        git commit -S -m "[Development] updated development version in pom.xml"

    - name: Test Build
      shell: bash
      run: |
        echo -e "\n\nTest Build ${{steps.git_release_version.outputs.lime-release-version}}"
        echo "Checking out ${{steps.git_release_version.outputs.lime-release-version}}"
        git checkout ${{steps.git_release_version.outputs.lime-release-version}}
        export MAVEN_GPG_PASSPHRASE="${{ inputs.code-signing-passphrase }}"
        # perform an install build under the release profile, no deployments.
        mvn --no-transfer-progress \
          -Dbuild.number=${{github.run_number}} \
          -Dgpg.keyname='${{inputs.code-signing-key-name}}' \
          -Prelease \
          ${{ inputs.extra-mvn-options }} install

    - name: Upload Docker logs for Test step
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: docker-logs
        path: |
          target/docker-logs/
          **/target/docker-logs

    - name: Perform Release Deployment
      shell: bash
      run: |
        echo -e "\n\nDeploying Release version ${{steps.git_release_version.outputs.lime-release-version}}"
        export MAVEN_GPG_PASSPHRASE="${{ inputs.code-signing-passphrase }}"
        # deploy to OSSRH
        mvn --no-transfer-progress \
          -Prelease \
          -Dbuild.number=${{github.run_number}} \
          -Dgpg.keyname='${{inputs.code-signing-key-name}}' \
          -DskipTests=true \
          -DskipITs=true \
          ${{ inputs.extra-mvn-options }} deploy

    - name: Push changes and tag
      shell: bash
      run: |
        defaultBranch=$(git remote show origin | grep "HEAD branch" | sed 's/.*: //')
        echo "Checking out $defaultBranch"
        git checkout $defaultBranch
        echo "Pushing version and tag changes"
        git push
        git push origin tag ${{steps.git_release_version.outputs.lime-release-version}}
