description: "Performs a build and maven deployment similar to a maven release with commits pushed at the end."
inputs:
  code-signing-key-name:
    description: 'Code signing GPG key name'
    required: true
  code-signing-passphrase:
    description: 'Code signing GPG passphrase'
    required: true
  extra-mvn-options:
    description: 'Extra maven command line options'
    required: false
outputs:
  release-version:
    description: 'The release version'
    value: ${{ steps.git_release_version.outputs.lime-release-version }}

runs:
  using: composite
  steps:
    - id: git_release_version
      name: Calculate Release Version
      shell: bash
      run: |
        RELEASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
        echo "lime-release-version=${RELEASE_VERSION}.${{github.run_number}}" >> "$GITHUB_OUTPUT"

    - name: Perform Release Deployment
      shell: bash
      run: |
        echo -e "\n\nDeploying Release version ${{steps.git_release_version.outputs.lime-release-version}}"
        # Needs to match github runner architecture.
        export DOCKER_DEFAULT_PLATFORM=linux/amd64
        export MAVEN_GPG_PASSPHRASE="${{ inputs.code-signing-passphrase }}"
        # deploy to OSSRH
        mvn -B --color always --no-transfer-progress \
          ${{ inputs.extra-mvn-options }} \
          -Darguments="-Dbuild.number=${{github.run_number}} -Dgpg.keyname='${{inputs.code-signing-key-name}}'" \
          releaser:release

    - name: Upload Reports
      if: always()
      uses: LimeMojito/oss-maven-standards/.github/actions/maven-report-upload@master

