name: Release Build
run-name: Build Release on ${{ github.head_ref || github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  oss-release-workflow:
    uses: LimeMojito/oss-maven-standards/.github/workflows/oss-release-build.yml@master
    secrets: inherit
    permissions:
      id-token: write
      contents: write
      packages: write
