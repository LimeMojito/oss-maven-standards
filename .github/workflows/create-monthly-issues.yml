name: Create Monthly Issues

on:
  schedule:
    # Run on the 1st day of every month at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  create-issue-templates:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - id: time
        name: Time Variables
        run: |
          echo month=$(date +"+%-m") >> "$GITHUB_OUTPUT"
          echo monthLong=$(date +"%B") >> "$GITHUB_OUTPUT"
          echo monthYear=$(date +"+%-m-%Y") >> "$GITHUB_OUTPUT"
          echo monthYearLong=$(date +"%B %Y") >> "$GITHUB_OUTPUT"
          echo year=$(date +"%Y") >> "$GITHUB_OUTPUT"

      ################# CHORES ########################

      - uses: LimeMojito/oss-maven-standards/.github/actions/create-issue-template@master
        name: Backup Website
        with:
          # This is a file created with the GitHub Issues Template wizard on the website.
          # they are stored in .github/ISSUE_TEMPLATE/
          template-file: chore-website.md
          issue-token: ${{ secrets.CREATE_MONTHLY_ISSUES }}
          title-suffix: ${{ steps.time.outputs.monthYearLong }}
          # you can "filter" tasks so they only are added in certain months
          # month-filter: 1,3,6,9
          # note these issues are not part of a project, to add to a project:
          # project: 'someorg/project-name'

      - uses: LimeMojito/oss-maven-standards/.github/actions/create-issue-template@master
        name: Update copyright (Jan)
        with:
          template-file: chore-copyright.md
          issue-token: ${{ secrets.CREATE_MONTHLY_ISSUES }}
          title-suffix: ${{ steps.time.outputs.year }}
          month-filter: 1
