name: Jira Code Agent Workflow
on:
  workflow_dispatch:
    inputs:
      action:
        description: Action to perform
        required: true
        type: choice
        options:
          - jira-event
      issue_key:
        description: 'Jira issue key (e.g., TEST-1)'
        required: true
        type: string
      issue_summary:
        description: 'Jira issue summary/title'
        required: true
        type: string
      issue_description:
        description: 'Jira issue description'
        required: false
        type: string
      issue_comments:
        description: 'Jira issue comments'
        required: false
      issue_attachments:
        description: 'Jira issue attachments'
        required: false
      trigger_comment:
        description: 'Comment that triggered Junie (used as user instruction)'
        required: false
        type: string

jobs:
  jira-code-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Environment Setup
        uses: LimeMojito/oss-maven-standards/.github/actions/lime-env-setup@master
        with:
          git-access-key: ${{ secrets.LIME_CODE_AGENT_GIT_KEY }}
          git-signing-key: ${{ secrets.LIME_CODE_AGENT_GIT_SIGNING_KEY }}
          git-id-name: "Lime Code Agent"
          git-id-email: "developers@limemojito.com"
          aws-region: ${{ secrets.LIME_AWS_REGION }}
          role-to-assume: ${{ secrets.LIME_AWS_ROLE_ARN }}
          code-signing-key: ${{ secrets.LIME_SIGNING_KEY }}
          code-signing-passphrase: ${{ secrets.LIME_SIGNING_PASSPHRASE }}
          central-id: ${{ secrets.LIME_CENTRAL_ID}}
          central-key: ${{ secrets.LIME_CENTRAL_KEY }}
          localstack-token: ${{ secrets.LIME_LOCALSTACK_TOKEN }}

      - name: Run Junie Agentic AI
        id: junie
        uses: JetBrains/junie-github-action@v1
        with:
          junie_api_key: ${{ secrets.LIME_CODE_AGENT_JUNIE_TOKEN }}
          jira_base_url: ${{ secrets.LIME_CODE_AGENT_JIRA_BASE_URL }}
          jira_email: ${{ secrets.LIME_CODE_AGENT_JIRA_EMAIL }}
          jira_api_token: ${{ secrets.LIME_CODE_AGENT_JIRA_API_TOKEN }}
          allowed_mcp_servers: "mcp_github_checks_server"

