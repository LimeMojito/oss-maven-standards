# This workflow invokes the Lime Code Agent for GitHub events.  Note that this workflow invokes
# Junie GitHub Workflow that will **ALWAYS** create a PR for changes, etc. To use a brave mode style action, see the
# `invoke-agent` action.
# It is designed to be delegated to from other repositories or triggered by common events.
# A calling workflow can pass the runner type to use, e.g. `runner: ubuntu-24.04-arm`.  The runner will default to ubuntu-24.04-arm.
# A calling workflow can pass the runner type to use, e.g. `runs-on: ubuntu-24.04-arm`.  The runner will default to ubuntu-24.04-arm.

name: OSS Maven Standards Lime Code Agent

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: ubuntu-24.04-arm

permissions:
  id-token: write
  contents: write      # Required to create branches, make commits, and push changes
  pull-requests: write # Required to create PRs, add comments to PRs, and update PR status
  issues: write        # Required to add comments to issues and update issue metadata
  checks: read         # Optional: needed for CI failure analysis with MCP servers
  actions: read        # Optional: needed for CI failure analysis with MCP servers (to fetch logs)

jobs:
  lime-code-agent:
    timeout-minutes: 30
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@Lime-Code-Agent')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@Lime-Code-Agent')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@Lime-Code-Agent')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@Lime-Code-Agent') || contains(github.event.issue.title, '@Lime-Code-Agent')) || contains(github.event.assignee.login, 'Lime-Code-Agent'))
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Check OS
        if: runner.os == 'Windows'
        shell: bash
        run: echo "Unsupported OS due to Junie Github Action" && exit 1
        # This workflow inherits the github.event object which the Junit workflow is using to work out use cases to execute.
        # 6/4/2026: Junie supplied github action does not run under windows due to issues detecting OS version and bash shell
        #           dependencies.  ``` Unsupported OS: MINGW64_NT-10.0-26100 ```

      - name: allowed-user-check
        id: auth_check
        uses: GuillaumeFalourd/github-team-members@v1
        with:
          org_slug: LimeMojito
          team_slug: developers
          token: ${{ secrets.LIME_CODE_AGENT_GITHUB_TOKEN }}

      - if: steps.auth_check.outputs.actor-belongs-team == 'true'
        run: echo "${{ github.actor }} belongs to Team"
        shell: bash

      - if: steps.auth_check.outputs.actor-belongs-team == 'false'
        run: echo "${{ github.actor }} doesn't belong to Team"
        shell: bash

      - name: Lime Setup Git
        uses: LimeMojito/oss-maven-standards/.github/actions/lime-env-setup-git@master
        with:
          git-access-key: ${{ secrets.LIME_CODE_AGENT_GIT_KEY }}
          git-signing-key: ${{ secrets.LIME_CODE_AGENT_GIT_SIGNING_KEY }}
          git-id-name: "Lime Code Agent"
          git-id-email: "developers@limemojito.com"

      - name: Lime Setup Java
        uses: LimeMojito/oss-maven-standards/.github/actions/lime-env-setup-java@master
        with:
          code-signing-key: ${{ secrets.LIME_SIGNING_KEY }}
          code-signing-passphrase: ${{ secrets.LIME_SIGNING_PASSPHRASE }}
          central-id: ${{ secrets.LIME_CENTRAL_ID}}
          central-key: ${{ secrets.LIME_CENTRAL_KEY }}
          localstack-token: ${{ secrets.LIME_LOCALSTACK_TOKEN }}

      - name: Run Junie Agentic AI
        if: steps.auth_check.outputs.actor-belongs-team == 'true'
        id: junie
        uses: JetBrains/junie-github-action@v1
        with:
          junie_api_key: ${{ secrets.LIME_CODE_AGENT_JUNIE_TOKEN }}
          allowed_mcp_servers: "mcp_github_checks_server, mcp_github_inline_comment_server"
          trigger_phrase: "@Lime-Code-Agent"
          assignee_trigger: Lime-Code-Agent
          label_trigger: lime-code-agent
